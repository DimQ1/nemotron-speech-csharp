name: VoiceType CI

run-name: VoiceType CI · ${{ github.ref_name }} · #${{ github.run_number }}

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-voicetype-release.yml'
      - '.github/workflows/release-voicetype-tag.yml'
      - 'VoiceType/**'
      - 'SpeechLib/**'
      - 'NemotronSpeech/**'
      - 'VoiceType.Tests/**'
      - 'NemotronSpeech.slnx'
  pull_request:
    paths:
      - '.github/workflows/build-voicetype-release.yml'
      - '.github/workflows/release-voicetype-tag.yml'
      - 'VoiceType/**'
      - 'SpeechLib/**'
      - 'NemotronSpeech/**'
      - 'VoiceType.Tests/**'
      - 'NemotronSpeech.slnx'

jobs:
  test:
    name: Unit Tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Check .NET SDK info
        run: dotnet --info

      - name: Run VoiceType unit tests
        run: dotnet test VoiceType.Tests/VoiceType.Tests.csproj -c Release -p:GpuArch=CPU --filter "FullyQualifiedName~Unit_"

  publish:
    name: Publish CI Artifact
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish VoiceType (win-x64, self-contained)
        run: dotnet publish VoiceType/VoiceType.csproj -c Release -p:GpuArch=CPU -r win-x64 --self-contained -o build/VoiceType-release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceType-ci-${{ github.run_number }}
          path: build/VoiceType-release
          if-no-files-found: error
