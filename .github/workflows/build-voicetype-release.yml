name: VoiceType CI

run-name: VoiceType CI · ${{ github.ref_name }} · #${{ github.run_number }}

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-voicetype-release.yml'
      - '.github/workflows/release-voicetype-tag.yml'
      - 'VoiceType/**'
      - 'SpeechLib/**'
      - 'NemotronSpeech/**'
      - 'VoiceType.Tests/**'
      - 'NemotronSpeech.slnx'
  pull_request:
    paths:
      - '.github/workflows/build-voicetype-release.yml'
      - '.github/workflows/release-voicetype-tag.yml'
      - 'VoiceType/**'
      - 'SpeechLib/**'
      - 'NemotronSpeech/**'
      - 'VoiceType.Tests/**'
      - 'NemotronSpeech.slnx'

jobs:
  test:
    name: Unit Tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run VoiceType unit tests
        run: dotnet test VoiceType.Tests/VoiceType.Tests.csproj -c Release -p:GpuArch=CPU --filter "FullyQualifiedName~Unit_"

  publish_cpu:
    name: Publish CPU CI Artifact
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish VoiceType (CPU)
        run: dotnet publish VoiceType/VoiceType.csproj -c Release -p:GpuArch=CPU -o build/VoiceType-release-cpu

      - name: Upload CPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceType-ci-cpu-${{ github.run_number }}
          path: build/VoiceType-release-cpu
          if-no-files-found: error

  publish_gpu:
    name: Publish GPU CI Artifact
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish VoiceType (GPU)
        run: dotnet publish VoiceType/VoiceType.csproj -c Release -p:GpuArch=Standard -o build/VoiceType-release-gpu

      - name: Upload GPU artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceType-ci-gpu-${{ github.run_number }}
          path: build/VoiceType-release-gpu
          if-no-files-found: error
