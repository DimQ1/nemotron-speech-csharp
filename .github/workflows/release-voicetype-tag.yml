name: VoiceType Tagged Release

run-name: VoiceType Release · ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Unit Tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Check .NET SDK info
        run: dotnet --info

      - name: Run VoiceType unit tests
        run: dotnet test VoiceType.Tests/VoiceType.Tests.csproj -c Release -p:GpuArch=CPU --filter "FullyQualifiedName~Unit_"

  publish_cpu:
    name: Publish Release
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish VoiceType (win-x64, self-contained)
        run: dotnet publish VoiceType/VoiceType.csproj -c Release -p:GpuArch=CPU -r win-x64 --self-contained -o build/VoiceType-release

      - name: Create archive
        shell: pwsh
        run: Compress-Archive -Path build/VoiceType-release/* -DestinationPath build/VoiceType-${{ github.ref_name }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceType-${{ github.ref_name }}
          path: build/VoiceType-${{ github.ref_name }}.zip
          if-no-files-found: error

  publish_release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: publish_cpu

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: VoiceType-${{ github.ref_name }}
          path: build/release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/release-assets/VoiceType-${{ github.ref_name }}.zip
